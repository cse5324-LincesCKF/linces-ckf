version: "3.9"

# Development docker-compose — mounts source for hot-reload
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      POSTGRES_DB: ${DB_NAME:-linces_dev}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: builder          # use build stage for dev (includes devDependencies)
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      NODE_ENV: development
      DB_HOST: db
    volumes:
      - ./backend:/app
      - /app/node_modules        # anonymous volume so host node_modules don't shadow
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    command: npm run start:dev

  frontend:
    build:
      context: ./frontend
      target: builder
    restart: unless-stopped
    env_file: ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    command: npm run dev -- --host

volumes:
  postgres_data:
